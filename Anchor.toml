# No [toolchain] anchor_version pin: this machine has anchor-cli 0.31.1 installed
# directly (not via avm), so pinning would trigger an avm lookup that is not
# present. The working pair (anchor 0.31.1 / solana 2.1.6 / rust 1.79 sbf) is
# recorded in the README.

[features]
resolution = true
skip-lint = false

[programs.devnet]
whistle = "9zhvjPzcUw4DZYBB7qSQ92pXyupkfV8ircrHW6dMAJpW"

[programs.localnet]
whistle = "9zhvjPzcUw4DZYBB7qSQ92pXyupkfV8ircrHW6dMAJpW"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

# Tests run against devnet (the cluster where the TxLINE txoracle program and the
# daily_scores_roots PDAs live). A bare local validator has neither, so the real
# CPI tests must point at devnet. See docs/ORACLE_FACTS.md.
[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
